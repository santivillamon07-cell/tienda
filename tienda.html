<!DOCTYPE html>
<html>
<body>
    <input type="text" id="txtCliente" placeholder="Nombre Cliente"><br><br>

    <select id="CmbTenis">
        <option value="50000">Tenis</option>
        <option value="30000">Camisas deportivas</option>
        <option value="25000">Zapatos</option>
        <option value="15000">Gorras</option>
        <option value="20000">Pantalones</option>
    </select><br><br>

    <input type="number" id="txtCantidad" placeholder="Cantidad" min="1" value="1"><br><br>

    <button onclick="calcular()">Calcular</button>
    <button onclick="reiniciar()">Reiniciar</button><br><br>

    <select id="ListBox1" size="3"></select>
    <select id="ListBox2" size="3"></select>
    <select id="ListBox3" size="4"></select>

    <script>
        function calcular() {
            let cliente = document.getElementById("txtCliente").value;
            let combo = document.getElementById("CmbTenis");
            let articulo = combo.options[combo.selectedIndex].text;
            let precio = Number(combo.value);
            let cantidad = Number(document.getElementById("txtCantidad").value);

            if (cantidad < 1) cantidad = 1;

            let subtotal = precio * cantidad;
            let desc = 0;

            if (articulo == "Camisas deportivas") desc = subtotal * 0.10;
            if (articulo == "Gorras") desc = subtotal * 0.20;

            let l1 = document.getElementById("ListBox1");
            let l2 = document.getElementById("ListBox2");
            let l3 = document.getElementById("ListBox3");

            l1.innerHTML = ""; l2.innerHTML = ""; l3.innerHTML = "";

            for (let i = 0; i < cantidad; i++) {
                l1.options.add(new Option(articulo));
                l2.options.add(new Option("₡" + precio));
            }

            l3.options.add(new Option("Cliente: " + cliente));
            l3.options.add(new Option("Subtotal: ₡" + subtotal));
            l3.options.add(new Option("Descuento: ₡" + desc));
            l3.options.add(new Option("Total: ₡" + (subtotal - desc)));
        }

        function reiniciar() {
            document.getElementById("txtCliente").value = "";
            document.getElementById("CmbTenis").selectedIndex = 0;
            document.getElementById("txtCantidad").value = 1;
            document.getElementById("ListBox1").innerHTML = "";
            document.getElementById("ListBox2").innerHTML = "";
            document.getElementById("ListBox3").innerHTML = "";
        }
    </script>
</body>
</html>
